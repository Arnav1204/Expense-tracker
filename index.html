<html>
<head>
	<title>Expense Tracker</title>
	<link rel="stylesheet" href="expense_style.css">
</head>
<body>
<div id="loginPage" class="login-container">
    <div class="login-card">
        <h2>Expense Tracker</h2>
        <p class="subtitle">Login to continue</p>

        <input type="text" id="username" placeholder="Username">

        <div class="password-field">
            <input type="password" id="password" placeholder="Password">
            <span onclick="togglePassword()">👁️</span>
        </div>

        <button onclick="login()">Login</button>

        <p id="login-error"></p>
    </div>
</div>

<div id="app" style="display:none;">
	<div class="app-wrapper"> 
		<div class="topbar">
			<span id="welcome"></span>
			<button onclick="logout()" class="logout-btn">Logout</button>
		</div>
		<div class="container">
			<h1>Expense Tracker</h1>
			
			<h2>Your Balance</h2>
			<h3 id="balance">₹0</h3>
			
			<h3>Set Monthly Budget</h3>
			<input type="number" id="budget" placeholder="Enter monthly budget">
			<p id="budget-status"></p>
			<div class="budget-bar">
			<div id="budget-fill"></div>
			</div>
			<div class="summary">
				<div>
					<h4>Income</h4>
					<p id="income" class="money plus">₹0</p>
				</div>
				<div>
					<h4>Expense</h4>
					<p id="expense" class="money minus">₹0</p>
				</div>
			</div>
			
			<button id="openModal">Show Analysis</button>

			<div id="chartModal" class="modal">
				<div class="modal-content">
					<span id="closeModal">&times;</span>
					<h3>Expense Analysis</h3>
					<canvas id="expenseChart"></canvas>
				</div>
			</div>
			
			<h3> Add Transaction</h3>
			<form id="form">
				<input type="text" id="text" placeholder="Enter description" required>
				<input type="number" id="amount" placeholder="Enter amount" required>
				
				<select id="type" required>
					<option value="">Select Type</option>
					<option value="credit">Credit</option>
					<option value="debit">Debit</option>
				</select>
				<select id="category" required>
					<option value="">Select Category</option>
					<option value="food">Food</option>
					<option value="entertainment">Entertainment</option>
					<option value="stationary">Stationary</option>
					<option value="bills">Bills</option>
					<option value="transport">Transport</option>
					<option value="other">Other</option>
				</select>
				<button>Add Transaction</button>
			</form>
			
			<button onclick="resetApp()">Reset All Data</button>
			
			<h3>History</h3>
			<ul id="list"></ul>
		</div>
	</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="expense_script.js"></script>
</body>
</html>
